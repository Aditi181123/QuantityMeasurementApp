server:
  port: 8080

spring:
  application:
    name: api-gateway
    
  cloud:
    gateway:
      routes:
        - id: measurement-service
          uri: lb://measurement-service
          predicates:
            - Path=/api/measurements/**
        
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
        
        - id: user-service-protected
          uri: lb://user-service
          predicates:
            - Path=/api/user/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
